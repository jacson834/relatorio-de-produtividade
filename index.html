<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestão de Atividades - Jacson Silva de Jesus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            color: #334155;
            padding: 2rem 1.5rem;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            --theme-accent: #059669;
            --theme-accent-soft: #ecfdf5;
            --theme-accent-border: #d1fae5;
            --theme-accent-strong: #047857;
            --theme-focus-ring: rgba(16, 185, 129, 0.35);
            --theme-focus-soft: rgba(16, 185, 129, 0.2);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Cabeçalho */
        .header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .header h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 2.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-strong));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #64748b;
            font-size: 1.05rem;
            font-weight: 500;
        }

        /* Cards de estatística / resumo */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .month-tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .month-tab {
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #334155;
            padding: 0.55rem 1rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .month-tab:hover {
            border-color: #94a3b8;
            color: #0f172a;
        }

        .month-tab.active {
            background: #059669;
            border-color: #059669;
            color: #ffffff;
        }

        .month-tab[data-month="2026-03"] {
            border-color: #f59e0b;
            color: #92400e;
            background: #fffbeb;
        }

        .month-tab[data-month="2026-03"].active {
            background: #d97706;
            border-color: #d97706;
            color: #ffffff;
        }

        .month-tab[data-month="2026-04"] {
            border-color: #10b981;
            color: #065f46;
            background: #ecfdf5;
        }

        .month-tab[data-month="2026-04"].active {
            background: #059669;
            border-color: #059669;
            color: #ffffff;
        }

        .month-tab[data-month="all"] {
            border-color: #6366f1;
            color: #3730a3;
            background: #eef2ff;
        }

        .month-tab[data-month="all"].active {
            background: #4f46e5;
            border-color: #4f46e5;
            color: #ffffff;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
        }

        .stat-card span {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--theme-accent);
            line-height: 1.2;
            margin-bottom: 0.25rem;
            display: block;
        }

        .stat-card label {
            font-size: 0.875rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.05em;
        }

        /* Filtros e busca */
        .filters {
            background: #ffffff;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            display: flex;
            flex-wrap: wrap;
            gap: 1.25rem;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: #475569;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 0.625rem 1rem;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            font-size: 0.95rem;
            color: #0f172a;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: var(--theme-accent);
            box-shadow: 0 0 0 3px var(--theme-focus-soft);
        }

        .reset-btn {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            height: 42px;
        }

        .reset-btn:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .export-btn {
            background: #0f172a;
            border: 1px solid #0f172a;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            height: 42px;
        }

        .export-btn:hover {
            background: #1e293b;
        }

        .reset-btn:focus-visible,
        .export-btn:focus-visible,
        .month-tab:focus-visible,
        .link-cell a:focus-visible,
        .back-to-top:focus-visible {
            outline: 3px solid var(--theme-focus-ring);
            outline-offset: 2px;
        }

        /* Tabela responsiva */
        .table-wrapper {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            overflow-x: auto;
        }

        .activity-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            min-width: 760px;
        }

        .activity-table th {
            text-align: left;
            padding: 1.25rem 1.5rem;
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #e2e8f0;
        }

        .activity-table td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            color: #334155;
        }

        .activity-table tbody tr {
            transition: background-color 0.15s ease;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .activity-table tbody tr:hover {
            background-color: #f8fafc;
        }

        .activity-table tbody tr:last-child td {
            border-bottom: none;
        }

        .material-name {
            font-weight: 500;
            color: #0f172a;
        }

        .link-cell a {
            text-decoration: none;
            color: var(--theme-accent);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background: var(--theme-accent-soft);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            border: 1px solid var(--theme-accent-border);
            word-break: break-word;
        }

        .link-cell a:hover {
            background: var(--theme-accent-border);
            color: var(--theme-accent-strong);
        }

        .no-link {
            color: #94a3b8;
            font-style: italic;
            font-size: 0.875rem;
            background: #f8fafc;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid #e2e8f0;
        }

        .badge-date {
            font-family: 'Inter', monospace;
            font-weight: 600;
            background: #f1f5f9;
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            display: inline-block;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .empty-row td {
            text-align: center;
            padding: 4rem 2rem;
            color: #94a3b8;
            font-size: 1rem;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.875rem;
            color: #94a3b8;
            padding-top: 1.5rem;
        }

        .lucide {
            width: 1.2em;
            height: 1.2em;
        }

        /* Botão Voltar ao Topo */
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--theme-accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-to-top.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .back-to-top:hover {
            background: var(--theme-accent-strong);
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 1.75rem;
            }
            .filter-group {
                min-width: 100%;
            }
            .reset-btn, .export-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>
<div class="container">

        <h1><i data-lucide="clipboard-list"></i>Atividades e Publicações - Jacson Silva de Jesus</h1>
        <p>Acompanhamento de ações, matérias e comunicados oficiais</p>

    <div class="month-tabs" id="monthTabs">

        <button class="month-tab active" type="button" data-month="2026-04">Abril</button>
        <button class="month-tab" type="button" data-month="all">Todos</button>
    </div>

    <div class="stats" id="statsContainer">
        <!-- estatísticas dinâmicas via JS -->
    </div>

    <div class="filters">
        <div class="filter-group">
            <label for="filterStartDate"><i data-lucide="calendar"></i> Data inicial</label>
            <input type="date" id="filterStartDate">
        </div>
        <div class="filter-group">
            <label for="filterEndDate"><i data-lucide="calendar"></i> Data final</label>
            <input type="date" id="filterEndDate">
        </div>
        <div class="filter-group">
            <label for="searchText"><i data-lucide="search"></i> Buscar por material / título</label>
            <input type="text" id="searchText" placeholder="Ex: SEMMA, Cidade Limpa, IPTU...">
        </div>
        <div class="filter-group">
            <label for="linkTypeFilter"><i data-lucide="link"></i> Tipo de conteúdo</label>
            <select id="linkTypeFilter">
                <option value="all">Todos (com/sem link)</option>
                <option value="with_link">Apenas com link externo</option>
                <option value="without_link">Apenas sem link (eventos, painel, gravação)</option>
            </select>
        </div>
        <button class="reset-btn" id="resetFiltersBtn"><i data-lucide="rotate-ccw"></i> Limpar filtros</button>
        <button class="export-btn" id="exportPdfBtn"><i data-lucide="file-down"></i> Exportar PDF</button>
    </div>

    <div class="table-wrapper">
        <table class="activity-table" id="activityTable">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Material / Atividade</th>
                    <th>Link / Referência</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- preenchido via JS -->
            </tbody>
        </table>
    </div>
    <footer>
        <span style="display: inline-flex; align-items: center; gap: 0.5rem; justify-content: center;">
            <i data-lucide="check-circle"></i> Dados atualizados mês a mês | Painel interativo - clique nos links para acessar matérias oficiais
        </span>
    </footer>
</div>

<button id="backToTopBtn" class="back-to-top" aria-label="Voltar ao topo">
    <i data-lucide="arrow-up"></i>
</button>

        { date: "2026-04-30", material: "Post Números UBSs", link: "https://www.instagram.com/p/DXuGI_RlVgG/?img_index=1" }
    ];

    // função para formatar data amigável (dd/mm/aaaa)
    function formatDate(dateStr) {
        if (!dateStr) return '';
        const dateObj = parseIsoDateLocal(dateStr);
        if (!dateObj) return dateStr;
        const day = String(dateObj.getDate()).padStart(2, '0');
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const year = dateObj.getFullYear();
        const weekDays = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
        const weekDay = weekDays[dateObj.getDay()];
        return `${day}/${month}/${year} (${weekDay})`;
    }

    function parseIsoDateLocal(dateStr) {
        if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return null;
        const [year, month, day] = dateStr.split('-').map(Number);
        return new Date(year, month - 1, day);
    }

    // Função para ordenar os dados por data (crescente)
    function sortDataByDate(dataArray) {
        return [...dataArray].sort((a, b) => parseIsoDateLocal(a.date) - parseIsoDateLocal(b.date));
    }

    let currentData = sortDataByDate(rawData);
    let currentFilteredData = []; // Armazena os dados filtrados atuais para exportação

    // DOM elements
    const tbody = document.getElementById('tableBody');
    const filterStart = document.getElementById('filterStartDate');
    const filterEnd = document.getElementById('filterEndDate');
    const searchText = document.getElementById('searchText');
    const linkTypeFilter = document.getElementById('linkTypeFilter');
    const resetBtn = document.getElementById('resetFiltersBtn');
    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const statsContainer = document.getElementById('statsContainer');
    const monthTabsContainer = document.getElementById('monthTabs');
    const monthTabs = monthTabsContainer ? monthTabsContainer.querySelectorAll('.month-tab') : [];

    let activeMonth = '2026-04';
    const monthThemes = {
        '2026-03': {
            accent: '#d97706',
            soft: '#fffbeb',
            border: '#fde68a',
            strong: '#b45309',
            focusRing: 'rgba(217, 119, 6, 0.35)',
            focusSoft: 'rgba(217, 119, 6, 0.2)'
        },
        '2026-04': {
            accent: '#059669',
            soft: '#ecfdf5',
            border: '#a7f3d0',
            strong: '#047857',
            focusRing: 'rgba(16, 185, 129, 0.35)',
            focusSoft: 'rgba(16, 185, 129, 0.2)'
        },
        all: {
            accent: '#4f46e5',
            soft: '#eef2ff',
            border: '#c7d2fe',
            strong: '#3730a3',
            focusRing: 'rgba(79, 70, 229, 0.35)',
            focusSoft: 'rgba(79, 70, 229, 0.2)'
        }
    };

    function applyMonthTheme(monthValue) {
        const theme = monthThemes[monthValue] || monthThemes.all;
        const rootStyle = document.body.style;
        rootStyle.setProperty('--theme-accent', theme.accent);
        rootStyle.setProperty('--theme-accent-soft', theme.soft);
        rootStyle.setProperty('--theme-accent-border', theme.border);
        rootStyle.setProperty('--theme-accent-strong', theme.strong);
        rootStyle.setProperty('--theme-focus-ring', theme.focusRing);
        rootStyle.setProperty('--theme-focus-soft', theme.focusSoft);
    }

    // Aplica todos os filtros
    function applyFilters() {
        let filtered = [...currentData];

        if (activeMonth !== 'all') {
            filtered = filtered.filter(item => item.date && item.date.startsWith(activeMonth));
        }

        // filtro de data início
        if (filterStart.value) {
            const start = parseIsoDateLocal(filterStart.value);
            filtered = filtered.filter(item => parseIsoDateLocal(item.date) >= start);
        }
        // data fim
        if (filterEnd.value) {
            const end = parseIsoDateLocal(filterEnd.value);
            filtered = filtered.filter(item => parseIsoDateLocal(item.date) <= end);
        }
        // busca textual (material)
        if (searchText.value.trim() !== '') {
            const query = searchText.value.trim().toLowerCase();
            filtered = filtered.filter(item => {
                const materialText = (item.material || '').toLowerCase();
                const linkText = (item.link || '').toLowerCase();
                return materialText.includes(query) || linkText.includes(query);
            });
        }
        // filtro tipo de link
        const linkType = linkTypeFilter.value;
        if (linkType === 'with_link') {
            filtered = filtered.filter(item => item.link && item.link.trim() !== '');
        } else if (linkType === 'without_link') {
            filtered = filtered.filter(item => !item.link || item.link.trim() === '');
        }

        currentFilteredData = filtered; // Atualiza a variável de exportação
        renderTable(filtered);
        updateStats(filtered);
    }

    // renderizar tabela
    function renderTable(dataToRender) {
        if (!tbody) return;
        if (dataToRender.length === 0) {
            tbody.innerHTML = `<tr class="empty-row"><td colspan="3"><i data-lucide="search-x" style="display:block; margin: 0 auto 1rem; width: 48px; height: 48px; opacity: 0.5;"></i> Nenhuma atividade encontrada com os filtros selecionados. Tente outros termos ou datas.</td></tr>`;
            lucide.createIcons();
            return;
        }

        let html = '';
        for (let item of dataToRender) {
            const formattedDate = formatDate(item.date);
            const safeLink = sanitizeUrl(item.link);
            const hasLink = safeLink !== '';
            let linkHtml = '';
            if (hasLink) {
                // abre em nova aba
                linkHtml = `<a href="${safeLink}" target="_blank" rel="noopener noreferrer"><i data-lucide="external-link"></i> Acessar conteúdo</a>`;
            } else {
                linkHtml = `<span class="no-link"><i data-lucide="pin"></i> Sem link externo (evento interno / painel)</span>`;
            }

            html += `
                <tr>
                    <td style="white-space: nowrap;"><span class="badge-date">${formattedDate}</span></td>
                    <td class="material-name">${escapeHtml(item.material)}</td>
                    <td class="link-cell">${linkHtml}</td>
                </tr>
            `;
        }
        tbody.innerHTML = html;
        lucide.createIcons();
    }

    // pequena função para evitar XSS (por segurança)
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    function sanitizeUrl(url) {
        if (!url || typeof url !== 'string') return '';
        const trimmedUrl = url.trim();
        if (!trimmedUrl) return '';
        try {
            const parsed = new URL(trimmedUrl);
            if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
                return parsed.href;
            }
            return '';
        } catch (err) {
            return '';
        }
    }

    // atualiza cards de estatística
    function updateStats(filteredData) {
        const totalAtividades = filteredData.length;
        const totalComLink = filteredData.filter(item => item.link && item.link.trim() !== '').length;
        const totalSemLink = totalAtividades - totalComLink;

        // dias distintos com atividades
        const uniqueDays = new Set(filteredData.map(item => item.date)).size;

        statsContainer.innerHTML = `
            <div class="stat-card"><span>${totalAtividades}</span><label>Atividades no período</label></div>
            <div class="stat-card"><span>${totalComLink}</span><label>Com link oficial</label></div>
            <div class="stat-card"><span>${totalSemLink}</span><label>Eventos / internos</label></div>
            <div class="stat-card"><span>${uniqueDays}</span><label>Dias com registros</label></div>
        `;
    }

    // resetar todos os filtros
    function resetFilters() {
        filterStart.value = '';
        filterEnd.value = '';
        searchText.value = '';
        linkTypeFilter.value = 'all';
        applyFilters();  // reaplica com dados originais (já ordenados)
    }

    function setActiveMonth(monthValue) {
        activeMonth = monthValue;
        applyMonthTheme(monthValue);
        for (let tab of monthTabs) {
            tab.classList.toggle('active', tab.dataset.month === monthValue);
        }
        applyFilters();
    }

    // listener eventos
    filterStart.addEventListener('change', applyFilters);
    filterEnd.addEventListener('change', applyFilters);
    searchText.addEventListener('input', applyFilters);
    linkTypeFilter.addEventListener('change', applyFilters);
    resetBtn.addEventListener('click', resetFilters);
    if (monthTabs.length > 0) {
        for (let tab of monthTabs) {
            tab.addEventListener('click', () => setActiveMonth(tab.dataset.month));
        }
    }

    // Lógica do botão Voltar ao Topo
    const backToTopBtn = document.getElementById('backToTopBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            backToTopBtn.classList.add('show');
        } else {
            backToTopBtn.classList.remove('show');
        }
    });
    backToTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Lógica para exportar PDF
    exportPdfBtn.addEventListener('click', () => {
        if (currentFilteredData.length === 0) {
            alert("Não há dados para exportar com os filtros atuais.");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Título do PDF
        doc.setFontSize(16);
        doc.text("Atividades e Publicações - Jacson Silva de Jesus", 14, 20);
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text("Prefeitura de Pimenta Bueno - RO", 14, 28);

        // Configuração da Tabela no PDF
        const tableColumn = ["Data", "Material / Atividade", "Link / Referência"];
        const tableRows = currentFilteredData.map(item => [
            formatDate(item.date),
            item.material,
            item.link && item.link.trim() !== '' ? item.link : "Sem link externo"
        ]);

        doc.autoTable({
            head: [tableColumn],
            body: tableRows,
            startY: 35,
            theme: 'striped',
            styles: { fontSize: 9, cellPadding: 4 },
            headStyles: { fillColor: [5, 150, 105] }, // Cor verde esmeralda para combinar com o tema
            columnStyles: {
                0: { cellWidth: 35 }, // Largura da coluna Data
                1: { cellWidth: 80 }, // Largura da coluna Material
                2: { cellWidth: 'auto', overflow: 'linebreak' } // O link quebra linha se for muito grande
            }
        });

        // Nome do arquivo com a data de geração
        const today = new Date().toISOString().split('T')[0];
        doc.save(`relatorio_atividades_${today}.pdf`);
    });

    // inicialização
    function init() {
        // assegurar ordenação original
        currentData = sortDataByDate(rawData);
        setActiveMonth('2026-04');
        // definir valores padrão dos campos de data como vazio (mostrar tudo)
        // não há necessidade de setar valor prévio
    }

    init();
</script>
